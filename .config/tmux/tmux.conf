# ~/.config/tmux/tmux.conf
# Tmux Configuration
# Generated with TmuxAI Config Generator
# https://tmuxai.dev

# -- Basic Settings ------------------------------------------
set -g prefix C-a
set -g escape-time 0
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on

# -- Status Bar ---------------------------------------------
set -g status-position top
set -g status-interval 1
set -g status-left "#{E:@catppuccin_status_session}"
set -ag status-left "#{session_name} "
set -g status-left-length 50
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

# -- Plugins -----------------------------------------------
# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Theme
set -g @plugin 'catppuccin/tmux'

# CPU Monitoring
set -g @plugin 'tmux-plugins/tmux-cpu'

# Theme configuration
set -g @catppuccin_flavour mocha

# Other plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'set -g @plugin 'fcsonline/tmux-thumbs''
set -g @plugin 'set -g @plugin 'sainnhe/tmux-fzf''
set -g @plugin 'set -g @plugin 'omerxx/tmux-sessionx''
set -g @plugin 'set -g @plugin 'omerxx/tmux-floax''

# -- Sesh Session Manager ------------------------------------
bind-key T display-popup -E -w 60% -h 70% \
  "session=\$(tv --source-command 'sesh list -tzc' --preview-command 'sesh preview {}') && sesh connect \$session"

# Initialize TMUX plugin manager
# Keep this line at the very bottom of tmux.conf
run '~/.tmux/plugins/tpm/tpm'

